<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="PC Guardian - Đăng nhập quản lý">
  <title>PC Guardian - Đăng nhập</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
</head>
<body>
  <div class="login-page" id="loginPage">
    <div class="login-bg-effects">
      <div class="orb"></div>
      <div class="orb"></div>
      <div class="orb"></div>
    </div>

    <div class="login-card">
      <div class="login-logo">
        <span class="shield-icon">🛡️</span>
        <h1>PC Guardian</h1>
        <p>Hệ thống quản lý máy tính cho phụ huynh</p>
      </div>

      <div class="login-error" id="loginError"></div>

      <form class="login-form" id="loginForm">
        <div class="input-group">
          <input
            type="password"
            id="passwordInput"
            placeholder="Nhập mật khẩu phụ huynh..."
            autocomplete="current-password"
            autofocus
          >
          <button type="button" class="toggle-password" id="togglePassword" aria-label="Hiển thị mật khẩu">
            👁️
          </button>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">
          Đăng nhập
        </button>
      </form>

      <p class="login-hint" id="loginHint">
        Nhập mật khẩu để truy cập bảng điều khiển
      </p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
