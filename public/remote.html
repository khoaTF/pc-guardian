<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PC Guardian - Quản lý từ xa</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #060918;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #e8eaed;
      --text-muted: #8b8fa3;
      --primary: #6c63ff;
      --green: #10b981;
      --red: #ef4444;
      --orange: #f59e0b;
    }
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1rem;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    .header {
      text-align: center;
      padding: 2rem 0;
    }
    
    .header h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, #6c63ff, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    
    .header p { color: var(--text-muted); }
    
    .status-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    
    .status-card {
      flex: 1;
      min-width: 150px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
    }
    
    .status-card .value {
      font-size: 1.5rem;
      font-weight: 700;
    }
    
    .status-card .label {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }
    
    .toolbar {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    
    .search-input {
      flex: 1;
      min-width: 200px;
      padding: 0.6rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
    }
    
    .search-input:focus { border-color: var(--primary); }
    
    .btn {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-green { background: var(--green); color: white; }
    .btn-green:hover { opacity: 0.85; }
    .btn-red { background: var(--red); color: white; }
    .btn-red:hover { opacity: 0.85; }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .btn-ghost:hover { border-color: var(--primary); color: var(--text); }
    
    .game-list { display: flex; flex-direction: column; gap: 0.5rem; }
    
    .game-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: all 0.2s;
    }
    
    .game-item:hover { border-color: rgba(108,99,255,0.3); }
    .game-item.disabled { opacity: 0.5; }
    
    .game-icon { font-size: 1.5rem; }
    
    .game-info { flex: 1; }
    .game-info .name { font-weight: 600; font-size: 0.95rem; }
    .game-info .process {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: monospace;
    }
    .game-info .category {
      display: inline-block;
      font-size: 0.65rem;
      padding: 2px 8px;
      background: rgba(108,99,255,0.15);
      color: var(--primary);
      border-radius: 4px;
      margin-top: 2px;
    }
    
    .game-actions { display: flex; gap: 0.5rem; align-items: center; }
    
    /* Toggle Switch */
    .toggle { position: relative; display: inline-block; width: 42px; height: 24px; cursor: pointer; }
    .toggle input { display: none; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.1);
      border-radius: 24px;
      transition: 0.3s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }
    .toggle input:checked + .toggle-slider { background: var(--green); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }
    
    .btn-icon {
      padding: 0.4rem;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    .btn-icon:hover { opacity: 1; }
    
    /* Add Game Form */
    .add-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      display: none;
    }
    .add-form.show { display: block; }
    .add-form h3 { margin-bottom: 1rem; }
    
    .form-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }
    
    .form-group {
      flex: 1;
      min-width: 200px;
    }
    
    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    
    .form-group input, .form-group select {
      width: 100%;
      padding: 0.5rem 0.75rem;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
    }
    
    .form-group input:focus, .form-group select:focus { border-color: var(--primary); }
    
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 0.75rem 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      animation: slideIn 0.3s ease;
      z-index: 999;
    }
    .toast.success { border-color: var(--green); }
    .toast.error { border-color: var(--red); }
    
    @keyframes slideIn {
      from { transform: translateX(100px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
    }
    
    @media (max-width: 600px) {
      .toolbar { flex-direction: column; }
      .status-bar { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🛡️ PC Guardian</h1>
      <p>Quản lý danh sách chặn từ xa</p>
    </div>

    <div class="status-bar">
      <div class="status-card">
        <div class="value" id="totalGames">--</div>
        <div class="label">Tổng game</div>
      </div>
      <div class="status-card">
        <div class="value" style="color:var(--green)" id="enabledGames">--</div>
        <div class="label">Đang chặn</div>
      </div>
      <div class="status-card">
        <div class="value" style="color:var(--text-muted)" id="disabledGames">--</div>
        <div class="label">Đã tắt</div>
      </div>
    </div>

    <div class="toolbar">
      <input type="text" class="search-input" id="searchInput" placeholder="🔍 Tìm kiếm game...">
      <button class="btn btn-primary" onclick="toggleAddForm()">➕ Thêm game</button>
      <button class="btn btn-ghost" onclick="loadGames()">🔄 Làm mới</button>
    </div>

    <!-- Add Game Form -->
    <div class="add-form" id="addForm">
      <h3>➕ Thêm game mới</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Tên game</label>
          <input type="text" id="newName" placeholder="VD: Liên Minh Huyền Thoại">
        </div>
        <div class="form-group">
          <label>Danh mục</label>
          <select id="newCategory">
            <option value="FPS">FPS</option>
            <option value="MOBA">MOBA</option>
            <option value="RPG">RPG</option>
            <option value="Battle Royale">Battle Royale</option>
            <option value="Sport">Sport</option>
            <option value="Action">Action</option>
            <option value="Sandbox">Sandbox</option>
            <option value="Emulator">Emulator</option>
            <option value="Platform">Platform</option>
            <option value="Khác" selected>Khác</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Tên process (.exe) - cách nhau bởi dấu phẩy</label>
          <input type="text" id="newProcess" placeholder="VD: game.exe, launcher.exe">
        </div>
      </div>
      <div style="display:flex;gap:0.5rem;margin-top:0.5rem">
        <button class="btn btn-green" onclick="addGame()">✅ Thêm</button>
        <button class="btn btn-ghost" onclick="toggleAddForm()">Hủy</button>
      </div>
    </div>

    <div id="gameList" class="game-list">
      <div class="loading">⏳ Đang tải...</div>
    </div>
  </div>

  <script>
    // ===== SUPABASE CONFIG =====
    const SUPABASE_URL = 'https://wmdudwrlceisphoopeed.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndtZHVkd3JsY2Vpc3Bob29wZWVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMDEyNjEsImV4cCI6MjA5MTg3NzI2MX0.es6KmwmTpoPQI1e67TPO4ISQpkTRwmydqC26nn0Tcq8';

    let allGames = [];

    // ===== SUPABASE API =====
    async function supabase(endpoint, options = {}) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, {
        method: options.method || 'GET',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': options.prefer || 'return=representation',
          ...options.headers
        },
        body: options.body ? JSON.stringify(options.body) : undefined
      });
      return res.json();
    }

    // ===== LOAD GAMES =====
    async function loadGames() {
      try {
        const data = await supabase('blocked_games?select=*&order=name');
        allGames = data;
        renderGames(allGames);
        updateStats();
      } catch (err) {
        document.getElementById('gameList').innerHTML = 
          '<div class="empty-state">❌ Không thể kết nối đến server</div>';
      }
    }

    // ===== RENDER =====
    function renderGames(games) {
      const search = document.getElementById('searchInput').value.toLowerCase();
      let filtered = games;
      if (search) {
        filtered = games.filter(g => 
          g.name.toLowerCase().includes(search) ||
          g.process_names.some(p => p.toLowerCase().includes(search))
        );
      }

      if (!filtered.length) {
        document.getElementById('gameList').innerHTML = 
          '<div class="empty-state">🎮 Không tìm thấy game</div>';
        return;
      }

      document.getElementById('gameList').innerHTML = filtered.map(g => `
        <div class="game-item ${!g.enabled ? 'disabled' : ''}" data-id="${g.id}">
          <span class="game-icon">${g.icon || '🎮'}</span>
          <div class="game-info">
            <div class="name">${g.name}</div>
            <div class="process">${g.process_names.join(', ')}</div>
            <span class="category">${g.category || 'Khác'}</span>
          </div>
          <div class="game-actions">
            <label class="toggle">
              <input type="checkbox" ${g.enabled ? 'checked' : ''} onchange="toggleGame('${g.id}', this.checked)">
              <span class="toggle-slider"></span>
            </label>
            <button class="btn-icon" onclick="deleteGame('${g.id}', '${g.name.replace(/'/g, "\\'")}')">🗑️</button>
          </div>
        </div>
      `).join('');
    }

    function updateStats() {
      const total = allGames.length;
      const enabled = allGames.filter(g => g.enabled).length;
      document.getElementById('totalGames').textContent = total;
      document.getElementById('enabledGames').textContent = enabled;
      document.getElementById('disabledGames').textContent = total - enabled;
    }

    // ===== CRUD =====
    async function toggleGame(id, enabled) {
      await supabase(`blocked_games?id=eq.${id}`, {
        method: 'PATCH',
        body: { enabled }
      });
      showToast(enabled ? '✅ Đã bật chặn' : '⏸️ Đã tắt chặn', 'success');
      loadGames();
    }

    async function deleteGame(id, name) {
      if (!confirm(`Xóa "${name}" khỏi danh sách?`)) return;
      await supabase(`blocked_games?id=eq.${id}`, { method: 'DELETE' });
      showToast(`🗑️ Đã xóa ${name}`, 'success');
      loadGames();
    }

    async function addGame() {
      const name = document.getElementById('newName').value.trim();
      const processStr = document.getElementById('newProcess').value.trim();
      const category = document.getElementById('newCategory').value;

      if (!name || !processStr) {
        showToast('Vui lòng nhập tên game và process', 'error');
        return;
      }

      const process_names = processStr.split(',').map(p => p.trim()).filter(Boolean);

      await supabase('blocked_games', {
        method: 'POST',
        body: { name, process_names, category, icon: '🎮', enabled: true }
      });

      document.getElementById('newName').value = '';
      document.getElementById('newProcess').value = '';
      toggleAddForm();
      showToast(`✅ Đã thêm ${name}`, 'success');
      loadGames();
    }

    // ===== UI =====
    function toggleAddForm() {
      document.getElementById('addForm').classList.toggle('show');
    }

    document.getElementById('searchInput').addEventListener('input', () => renderGames(allGames));

    function showToast(msg, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // ===== INIT =====
    loadGames();
  </script>
</body>
</html>
